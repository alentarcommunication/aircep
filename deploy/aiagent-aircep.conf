# nginx config for aiagent.webtrendsetter.com
# Serves the aircep landing page at /aircep/ (Node app on 127.0.0.1:5001).
# All other paths replicate the behavior this domain previously had via
# fallthrough to the airecep.tech server block, so nothing existing breaks.

server {
    listen 80;
    server_name aiagent.webtrendsetter.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aiagent.webtrendsetter.com;

    ssl_certificate /etc/letsencrypt/live/aiagent.webtrendsetter.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiagent.webtrendsetter.com/privkey.pem;

    # --- aircep landing page (new) ---
    location = /aircep { return 301 /aircep/; }

    location /aircep/ {
        proxy_pass http://127.0.0.1:5001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- pre-existing behavior for this domain (unchanged) ---
    location /ai-voice-assistent/ {
        alias /var/www/ai-voice-assistent/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /landingpage/thankyou {
        alias /var/www/landingpage/thankyou/;
        index index.html;
        default_type text/html;
        try_files $uri $uri/ /var/www/landingpage/thankyou/index.html;
    }

    location /landingpage/2/thankyou {
        alias /var/www/landingpage/2/thankyou/;
        index index.html;
        default_type text/html;
        try_files $uri $uri/ /var/www/landingpage/2/thankyou/index.html;
    }

    location /landingpage/2/ {
        alias /var/www/landingpage/2/;
        index index.html;
        try_files $uri $uri/ /landingpage/2/index.html;
    }

    location /landingpage/ {
        alias /var/www/landingpage/;
        index index.html;
        try_files $uri $uri/ /landingpage/index.html;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_cache_bypass $http_upgrade;
    }

    client_max_body_size 50M;
}
